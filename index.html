<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BioPathogenix Client Experience Survey</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f4f7fb;
    color: #132238;
    line-height: 1.5;
    padding: 24px 16px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .card {
    background: #fff;
    border: 1px solid #e4ebf4;
    border-radius: 16px;
    box-shadow: 0 12px 28px rgba(17, 31, 53, 0.08);
    overflow: hidden;
  }
  .hdr {
    background: linear-gradient(135deg, #234a8f 0%, #11796f 100%);
    color: #fff;
    padding: 24px 28px;
  }
  .hdr h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .hdr p { margin-top: 7px; font-size: 13px; color: rgba(255,255,255,.88); }
  .body { padding: 26px 28px 30px; }
  .q { margin-top: 22px; }
  .q:first-child { margin-top: 0; }
  .ql {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: #234a8f;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .field { margin-bottom: 14px; }
  .flabel {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #5b6d84;
  }
  input[type=text], input[type=email], textarea, select {
    width: 100%;
    padding: 12px 13px;
    border: 1.4px solid #dfe7f1;
    border-radius: 10px;
    background: #fff;
    color: #132238;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #234a8f;
    box-shadow: 0 0 0 3px rgba(35,74,143,.08);
  }
  textarea { resize: vertical; min-height: 84px; }
  .orow {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border: 1.4px solid #dfe7f1;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: #fff;
    font-size: 14px;
  }
  .orow:hover { border-color: #234a8f; background: #f7fafe; }
  .orow.sel { border-color: #234a8f; background: #eef4ff; }
  .orow input { width: 17px; height: 17px; accent-color: #234a8f; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .stars { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .sbtn {
    min-width: 40px;
    padding: 10px 0;
    border: 1.4px solid #dfe7f1;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
    color: #51657d;
    transition: all .15s;
  }
  .sbtn:hover { border-color: #234a8f; color: #234a8f; }
  .sbtn.on { background: #234a8f; color: #fff; border-color: #234a8f; }
  .sats { display: flex; flex-wrap: wrap; gap: 6px; }
  .satb {
    padding: 10px 12px;
    border: 1.4px solid #dfe7f1;
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: #51657d;
    transition: all .15s;
  }
  .satb:hover { border-color: #11796f; color: #11796f; }
  .satb.on { background: #11796f; color: #fff; border-color: #11796f; }
  .actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 13px 22px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform .15s, background .15s, border-color .15s, color .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .bp { background: #234a8f; color: #fff; }
  .bp:hover { background: #1d3d75; }
  .bp:disabled { background: #8aa9d3; cursor: not-allowed; transform: none; }
  .bs { background: #fff; color: #234a8f; border: 1.4px solid #234a8f; }
  .bs:hover { background: #eef4ff; }
  .err {
    background: #fef1f1;
    color: #b42318;
    padding: 13px 16px;
    border: 1px solid #f5c2c2;
    border-radius: 10px;
    margin-bottom: 18px;
    font-size: 14px;
  }
  .ok {
    text-align: center;
    padding: 52px 30px;
  }
  .ck {
    width: 66px;
    height: 66px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: #11796f;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .ok h2 { font-size: 22px; margin-bottom: 10px; }
  .ok p { color: #5b6d84; font-size: 15px; margin-bottom: 22px; }
  .abar { max-width: 760px; margin: 14px auto 0; text-align: center; }
  .alink {
    color: #6e7d92;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: inherit;
  }
  .apanel {
    background: #fff;
    border-radius: 14px;
    padding: 22px;
    margin-top: 12px;
    box-shadow: 0 2px 16px rgba(20,40,70,.08);
    border: 1px solid #e6edf5;
  }
  .apanel h3 { font-size: 16px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 7px 8px; text-align: left; border-bottom: 1px solid #eef1f5; }
  th { background: #f7fafe; font-weight: 700; color: #44546a; white-space: nowrap; }
  td { vertical-align: top; }
  .muted { color: #8a97a6; font-size: 13px; }
  .clr {
    background: none;
    border: 1px solid #dfe7f1;
    color: #8a97a6;
    padding: 6px 11px;
    border-radius: 7px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .clr:hover { border-color: #b42318; color: #b42318; }
  @media (max-width: 620px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const PK  = "QXmszPN0KD4BJ5XrW";
const SVC = "service_014gtcm";
const TPL = "template_1mjq977";
const SK  = "bpx_responses";

const SOURCES = [
  "Referral or peer recommendation",
  "Conference or trade show",
  "Web search",
  "Sales representative",
  "Industry publication",
  "Other"
];

const PRODUCTS = [
  "Molecular assays / PCR kits",
  "Validation & verification services",
  "Reagents & consumables",
  "Instrumentation",
  "LIMS / software integration",
  "Quality control materials",
  "Training & support packages",
  "Other"
];

const SAT = [
  "Very dissatisfied",
  "Dissatisfied",
  "Neutral",
  "Satisfied",
  "Very satisfied"
];

const load = () => {
  try {
    const d = localStorage.getItem(SK);
    return d ? JSON.parse(d) : [];
  } catch (e) {
    return [];
  }
};

const save = (d) => {
  try {
    localStorage.setItem(SK, JSON.stringify(d));
  } catch (e) {}
};

const esc = (v = "") =>
  String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");

const clean = (v = "") => String(v ?? "").trim();

const nl2br = (v = "") => esc(v).replace(/\n/g, "<br/>");

const fmtSubmitted = (value) => {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return esc(value || "");
  return d.toLocaleString("en-US", {
    month: "numeric",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
};

const emailHTML = (r) => {
  const fas = Math.max(1, Math.min(5, parseInt(r.validationFASRating, 10) || 1));
  const nps = Math.max(0, Math.min(10, parseInt(r.nps, 10) || 0));

  const sat = clean(r.satisfaction);
  const satMeta = {
    "Very dissatisfied": { bg: "#b45309", fg: "#fff" },
    Dissatisfied: { bg: "#dc2626", fg: "#fff" },
    Neutral: { bg: "#9ca3af", fg: "#fff" },
    Satisfied: { bg: "#1d4ed8", fg: "#fff" },
    "Very satisfied": { bg: "#11796f", fg: "#fff" }
  }[sat] || { bg: "#9ca3af", fg: "#fff" };

  const answerBox = (value) => `
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:8px;">
      <tr>
        <td style="background:#f5f8fc;border:1px solid #e5edf6;border-radius:10px;padding:13px 15px;font-size:14px;line-height:1.55;color:#12233f;">
          ${value ? nl2br(value) : "<span style='color:#8a97a6;'>No response</span>"}
        </td>
      </tr>
    </table>`;

  const pill = (text, bg, fg) => `
    <span style="display:inline-block;background:${bg};color:${fg};border:1px solid ${bg};padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;line-height:1.2;">
      ${esc(text)}
    </span>`;

  const miniPill = (text, on) => `
    <span style="display:inline-block;min-width:34px;text-align:center;padding:8px 0;margin:0 4px 6px 0;border-radius:7px;font-size:13px;font-weight:700;
      background:${on ? "#2f4f95" : "#f7f9fd"};color:${on ? "#fff" : "#7b8ca5"};border:1px solid ${on ? "#2f4f95" : "#d8e1ee"};">
      ${esc(text)}
    </span>`;

  const chips = (raw) => {
    const items = String(raw || "")
      .split(";")
      .map((s) => s.trim())
      .filter(Boolean);

    if (!items.length) {
      return `<span style="color:#8a97a6;font-size:14px;">No response</span>`;
    }

    return items
      .map(
        (item) => `
          <span style="display:inline-block;margin:0 6px 6px 0;padding:5px 11px;border-radius:999px;border:1px solid #bfd3ee;background:#eef5ff;color:#1c4ea3;font-size:13px;line-height:1.2;">
            ${esc(item)}
          </span>`
      )
      .join("");
  };

  const contactCell = (label, value) => `
    <td width="50%" valign="top" style="padding:0 10px 14px 0;">
      <div style="font-size:11px;line-height:1.2;letter-spacing:.5px;text-transform:uppercase;color:#7e8ea8;font-weight:700;margin-bottom:4px;">
        ${label}
      </div>
      <div style="font-size:15px;line-height:1.5;color:#12233f;">
        ${value || "<span style='color:#8a97a6;'>No response</span>"}
      </div>
    </td>`;

  return `
  <!doctype html>
  <html>
    <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#12233f;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#f4f7fb;">
        <tr>
          <td align="center" style="padding:24px 12px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:720px;border-collapse:collapse;background:#ffffff;border:1px solid #e6edf5;box-shadow:0 10px 24px rgba(17,31,53,.08);">
              <tr>
                <td style="background:#234a8f;padding:20px 24px;color:#ffffff;">
                  <div style="font-size:19px;font-weight:700;line-height:1.25;">New Survey Response</div>
                  <div style="margin-top:7px;font-size:13px;line-height:1.45;color:#eaf1ff;">
                    Submitted ${fmtSubmitted(r.submittedAt)}
                  </div>
                </td>
              </tr>

              <tr>
                <td style="padding:24px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                    <tr>
                      <td style="background:#f7fafe;border:1px solid #e5edf6;border-radius:12px;padding:18px 18px 10px 18px;">
                        <div style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;margin-bottom:14px;">
                          Contact Information
                        </div>

                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                          <tr>
                            ${contactCell("Full Name", `<strong>${esc(r.name)}</strong>`)}
                            ${contactCell("Organization", `<strong>${esc(r.org)}</strong>`)}
                          </tr>
                          <tr>
                            ${contactCell("Email", `<a href="mailto:${esc(r.email)}" style="color:#1c4ea3;text-decoration:none;">${esc(r.email)}</a>`)}
                            ${contactCell("Role / Title", esc(r.role || ""))}
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q1 &mdash; How They Found Us
                      </td>
                    </tr>
                    <tr>
                      <td>${answerBox(r.source)}</td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q2 &mdash; Validation / FAS Rating
                      </td>
                    </tr>
                    <tr>
                      <td style="padding-bottom:8px;">
                        ${Array.from({ length: 5 }, (_, i) => miniPill(i + 1, i + 1 === fas)).join("")}
                        <span style="display:inline-block;margin-left:8px;font-size:14px;font-weight:700;color:#234a8f;vertical-align:middle;">
                          ${fas}/5
                        </span>
                      </td>
                    </tr>
                    <tr>
                      <td>${answerBox(r.fasComment)}</td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q3 &mdash; Workflow Suggestions
                      </td>
                    </tr>
                    <tr>
                      <td>${answerBox(r.workflowSuggestions)}</td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q4 &mdash; Overall Satisfaction
                      </td>
                    </tr>
                    <tr>
                      <td>${pill(sat || "No response", satMeta.bg, satMeta.fg)}</td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q5 &mdash; Products Interested In
                      </td>
                    </tr>
                    <tr>
                      <td>${chips(r.productsInterested)}</td>
                    </tr>
                  </table>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin-top:22px;">
                    <tr>
                      <td style="font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:#234a8f;font-weight:700;padding-bottom:8px;">
                        Q6 &mdash; NPS Score (Likelihood to Recommend)
                      </td>
                    </tr>
                    <tr>
                      <td style="padding-bottom:8px;">
                        ${Array.from({ length: 11 }, (_, i) => miniPill(i, i === nps)).join("")}
                        <span style="display:inline-block;margin-left:8px;font-size:14px;font-weight:700;color:#234a8f;vertical-align:middle;">
                          ${nps}/10
                        </span>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </body>
  </html>`;
};

const blank = {
  name: "",
  org: "",
  email: "",
  role: "",
  source: "",
  sourceOther: "",
  fasExp: "",
  fasComment: "",
  workflow: "",
  satisfaction: "",
  products: [],
  productsOther: "",
  nps: ""
};

function App() {
  const [sub, setSub] = useState(false);
  const [showA, setShowA] = useState(false);
  const [resp, setResp] = useState(load);
  const [errs, setErrs] = useState([]);
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState(blank);

  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const tog = (p) =>
    setF((prev) => ({
      ...prev,
      products: prev.products.includes(p)
        ? prev.products.filter((x) => x !== p)
        : [...prev.products, p]
    }));

  const valid = () => {
    const e = [];
    if (!f.name.trim()) e.push("Full name is required");
    if (!f.org.trim()) e.push("Organization is required");
    if (!f.email.trim()) e.push("Email is required");
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.push("Enter a valid email");
    if (!f.source) e.push("Q1: Please select how you found us");
    if (!f.fasExp) e.push("Q2: Please rate your FAS experience");
    if (!f.satisfaction) e.push("Q4: Please select satisfaction level");
    if (f.nps === "") e.push("Q6: Please select NPS score");
    return e;
  };

  const rec = () => ({
    submittedAt: new Date().toISOString(),
    name: f.name,
    org: f.org,
    email: f.email,
    role: f.role,
    source: f.source === "Other" ? "Other: " + f.sourceOther : f.source,
    validationFASRating: f.fasExp,
    fasComment: f.fasComment,
    workflowSuggestions: f.workflow,
    satisfaction: f.satisfaction,
    productsInterested: [
      ...f.products.filter((p) => p !== "Other"),
      ...(f.products.includes("Other") && f.productsOther ? ["Other: " + f.productsOther] : [])
    ].join("; "),
    nps: f.nps
  });

  const submit = async () => {
    const e = valid();
    setErrs(e);
    if (e.length) {
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    const r = rec();
    setBusy(true);
    try {
      emailjs.init({ publicKey: PK });
      await emailjs.send(SVC, TPL, {
        to_email: "venkatesh.kolluru@biopathogenix.com",
        subject: "New Survey - " + r.name + " (" + r.org + ")",
        html_content: emailHTML(r),
        respondent_name: r.name,
        respondent_org: r.org,
        respondent_email: r.email,
        submitted_at: new Date(r.submittedAt).toLocaleString()
      });
      const up = [...resp, r];
      setResp(up);
      save(up);
      setSub(true);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      setErrs(["Failed: " + (err.text || err.message || JSON.stringify(err))]);
    }
    setBusy(false);
  };

  const reset = () => {
    setF(blank);
    setSub(false);
    setErrs([]);
  };

  const csv = () => {
    if (!resp.length) return;
    const cols = [
      "submittedAt",
      "name",
      "org",
      "email",
      "role",
      "source",
      "validationFASRating",
      "fasComment",
      "workflowSuggestions",
      "satisfaction",
      "productsInterested",
      "nps"
    ];
    const escCsv = (v) => '"' + String(v || "").replace(/"/g, '""') + '"';
    const data = [cols.join(","), ...resp.map((r) => cols.map((c) => escCsv(r[c])).join(","))].join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([data], { type: "text/csv" }));
    a.download = "bpx_survey.csv";
    a.click();
  };

  const clrAll = () => {
    if (window.confirm("Delete all saved responses?")) {
      setResp([]);
      localStorage.removeItem(SK);
    }
  };

  if (sub) {
    return (
      <div className="wrap">
        <div className="card">
          <div className="hdr">
            <h1>Thank you</h1>
            <p>Your survey response has been submitted successfully.</p>
          </div>
          <div className="ok">
            <div className="ck">✓</div>
            <h2>Submission Complete</h2>
            <p>We received your response and emailed the team.</p>
            <div className="actions" style={{ justifyContent: "center" }}>
              <button className="btn bp" onClick={reset}>Submit Another Response</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  const selectedSource = f.source === "Other" ? `Other: ${f.sourceOther}` : f.source;
  const selectedProducts = [
    ...f.products.filter((p) => p !== "Other"),
    ...(f.products.includes("Other") && f.productsOther ? [`Other: ${f.productsOther}`] : [])
  ];

  return (
    <div className="wrap">
      <div className="card">
        <div className="hdr">
          <h1>BioPathogenix Client Experience Survey</h1>
          <p>Please complete the survey below. Fields marked by context are required.</p>
        </div>

        <div className="body">
          {errs.length > 0 && (
            <div className="err">
              <strong>Please fix the following:</strong>
              <ul style={{ marginTop: 8, paddingLeft: 18 }}>
                {errs.map((e, i) => <li key={i}>{e}</li>)}
              </ul>
            </div>
          )}

          <div className="field">
            <label className="flabel">Full Name</label>
            <input type="text" value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="Your full name" />
          </div>

          <div className="grid">
            <div className="field">
              <label className="flabel">Organization</label>
              <input type="text" value={f.org} onChange={(e) => set("org", e.target.value)} placeholder="Company / lab / institution" />
            </div>
            <div className="field">
              <label className="flabel">Role / Title</label>
              <input type="text" value={f.role} onChange={(e) => set("role", e.target.value)} placeholder="Job title" />
            </div>
          </div>

          <div className="field">
            <label className="flabel">Email</label>
            <input type="email" value={f.email} onChange={(e) => set("email", e.target.value)} placeholder="name@company.com" />
          </div>

          <div className="q">
            <span className="ql">Q1 &mdash; How did you find us?</span>
            <div className="opts">
              {SOURCES.map((s) => (
                <label key={s} className={"orow " + (f.source === s ? "sel" : "")}>
                  <input type="radio" name="source" checked={f.source === s} onChange={() => set("source", s)} />
                  <span>{s}</span>
                </label>
              ))}
            </div>
            {f.source === "Other" && (
              <div className="field" style={{ marginTop: 10 }}>
                <input
                  type="text"
                  value={f.sourceOther}
                  onChange={(e) => set("sourceOther", e.target.value)}
                  placeholder="Please specify"
                />
              </div>
            )}
          </div>

          <div className="q">
            <span className="ql">Q2 &mdash; Validation / FAS Rating</span>
            <div className="stars">
              {[1, 2, 3, 4, 5].map((n) => (
                <button
                  key={n}
                  type="button"
                  className={"sbtn " + (String(f.fasExp) === String(n) ? "on" : "")}
                  onClick={() => set("fasExp", String(n))}
                >
                  {n}
                </button>
              ))}
              <span style={{ marginLeft: 8, color: "#234a8f", fontWeight: 800 }}>{f.fasExp ? `${f.fasExp}/5` : ""}</span>
            </div>
            <div className="field" style={{ marginTop: 10 }}>
              <textarea
                value={f.fasComment}
                onChange={(e) => set("fasComment", e.target.value)}
                placeholder="Optional comment"
              />
            </div>
          </div>

          <div className="q">
            <span className="ql">Q3 &mdash; Workflow Suggestions</span>
            <div className="field">
              <textarea
                value={f.workflow}
                onChange={(e) => set("workflow", e.target.value)}
                placeholder="Share your suggestions"
              />
            </div>
          </div>

          <div className="q">
            <span className="ql">Q4 &mdash; Overall Satisfaction</span>
            <div className="sats">
              {SAT.map((s) => (
                <button
                  key={s}
                  type="button"
                  className={"satb " + (f.satisfaction === s ? "on" : "")}
                  onClick={() => set("satisfaction", s)}
                >
                  {s}
                </button>
              ))}
            </div>
          </div>

          <div className="q">
            <span className="ql">Q5 &mdash; Products Interested In</span>
            <div className="opts">
              {PRODUCTS.map((p) => (
                <label key={p} className={"orow " + (f.products.includes(p) ? "sel" : "")}>
                  <input
                    type="checkbox"
                    checked={f.products.includes(p)}
                    onChange={() => tog(p)}
                  />
                  <span>{p}</span>
                </label>
              ))}
            </div>
            {f.products.includes("Other") && (
              <div className="field" style={{ marginTop: 10 }}>
                <input
                  type="text"
                  value={f.productsOther}
                  onChange={(e) => set("productsOther", e.target.value)}
                  placeholder="Please specify"
                />
              </div>
            )}
          </div>

          <div className="q">
            <span className="ql">Q6 &mdash; NPS Score (Likelihood to Recommend)</span>
            <div className="stars">
              {Array.from({ length: 11 }, (_, i) => i).map((n) => (
                <button
                  key={n}
                  type="button"
                  className={"sbtn " + (String(f.nps) === String(n) ? "on" : "")}
                  onClick={() => set("nps", String(n))}
                  style={{ minWidth: 36 }}
                >
                  {n}
                </button>
              ))}
              <span style={{ marginLeft: 8, color: "#234a8f", fontWeight: 800 }}>{f.nps !== "" ? `${f.nps}/10` : ""}</span>
            </div>
          </div>

          <div className="actions">
            <button className="btn bp" onClick={submit} disabled={busy}>
              {busy ? "Sending..." : "Submit Survey"}
            </button>
            <button className="btn bs" onClick={reset} type="button">Reset</button>
          </div>

          <div style={{ marginTop: 18, color: "#8a97a6", fontSize: 12 }}>
            Selected source: {selectedSource || "None"} · Selected products: {selectedProducts.length ? selectedProducts.join(", ") : "None"}
          </div>
        </div>
      </div>

      <div className="abar">
        <button className="alink" onClick={() => setShowA((v) => !v)}>
          {showA ? "Hide saved responses" : "Show saved responses"}
        </button>

        {showA && (
          <div className="apanel">
            <h3>Saved Responses</h3>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
              <button className="clr" onClick={csv}>Export CSV</button>
              <button className="clr" onClick={clrAll}>Delete All</button>
              <span className="muted">{resp.length} saved response(s)</span>
            </div>

            {resp.length ? (
              <div style={{ overflowX: "auto" }}>
                <table>
                  <thead>
                    <tr>
                      <th>Submitted</th>
                      <th>Name</th>
                      <th>Org</th>
                      <th>Email</th>
                      <th>Source</th>
                      <th>FAS</th>
                      <th>Satisfaction</th>
                      <th>NPS</th>
                    </tr>
                  </thead>
                  <tbody>
                    {resp.slice().reverse().map((r, i) => (
                      <tr key={i}>
                        <td>{new Date(r.submittedAt).toLocaleString()}</td>
                        <td>{r.name}</td>
                        <td>{r.org}</td>
                        <td>{r.email}</td>
                        <td>{r.source}</td>
                        <td>{r.validationFASRating}</td>
                        <td>{r.satisfaction}</td>
                        <td>{r.nps}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="muted">No saved responses yet.</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
